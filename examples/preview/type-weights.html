<!doctype html><html><head><meta charset="utf-8"><title>Type · Family weights</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font:var(--type-caption); color:var(--gray); letter-spacing:.4px; text-transform:uppercase; margin-bottom:14px;">Google Sans · bundled brand family</div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; align-items:baseline;">
    <span style="font:400 24px/1.2 var(--font-sans);">Regular 400 — DevFest Toulouse</span>
    <span style="font:400 italic 24px/1.2 var(--font-sans); color:var(--gray);">Italic 400 — Powering the cloud</span>
    <span style="font:500 24px/1.2 var(--font-sans);">Medium 500 — DevFest Toulouse</span>
    <span style="font:500 italic 24px/1.2 var(--font-sans); color:var(--gray);">Medium Italic 500</span>
    <span style="font:700 24px/1.2 var(--font-sans);">Bold 700 — DevFest Toulouse</span>
    <span style="font:700 italic 24px/1.2 var(--font-sans); color:var(--gray);">Bold Italic 700</span>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light); margin-top:16px;">Italic reserved for sponsor Platinum baselines. For body emphasis use <strong>Bold</strong>.</div>
</div></body></html>
