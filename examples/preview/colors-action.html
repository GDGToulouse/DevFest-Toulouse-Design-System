<!doctype html><html><head><meta charset="utf-8"><title>Action colors</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font:var(--type-caption); color:var(--gray); margin-bottom:10px; letter-spacing:.4px; text-transform:uppercase;">Action · functional, not identity</div>
  <div class="row" style="margin-bottom:16px;">
    <div class="swatch" style="flex:1"><div class="chip" style="background:#507BBD"></div><div class="name">Blue CTA</div><div class="hex">#507BBD · primary buttons</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:#63C6F2"></div><div class="name">Sky</div><div class="hex">#63C6F2 · also Discovery tier</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:#C4E6F1"></div><div class="name">Sky soft</div><div class="hex">#C4E6F1</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:#E84336"></div><div class="name">Error</div><div class="hex">#E84336 · alerts only</div></div>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light);">Le bleu d'action n'est jamais utilisé comme couleur d'identité ou de section. Le rouge est strictement réservé aux erreurs / alertes.</div>
</div></body></html>
