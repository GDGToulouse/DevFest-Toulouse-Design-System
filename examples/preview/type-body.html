<!doctype html><html><head><meta charset="utf-8"><title>Type · Body scale</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="font:var(--type-description); color:var(--ink);">Description · 32 / Regular — pour intro hero, About</div>
  <div style="font:var(--type-stat-value); color:var(--ink); margin-top:8px;">1 200</div>
  <div style="font:var(--type-stat-label); color:var(--ink); margin-top:-4px;">stat-label · 24 Regular</div>
  <div style="font:var(--type-body); color:var(--ink); margin-top:10px;">Body · 16 / Regular — paragraphes courants, navigation, footer. Line-height 1.6 pour lisibilité.</div>
  <div style="display:flex; gap:14px; align-items:baseline; margin-top:6px;">
    <span style="font:var(--type-body-bold);">Body Bold · 16</span>
    <span style="font:var(--type-caption); letter-spacing:.4px; color:var(--gray);">CAPTION · 12</span>
    <span style="font:var(--type-small); color:var(--gray-light);">small · 10</span>
  </div>
</div></body></html>
