<!doctype html><html><head><meta charset="utf-8"><title>Wordmark Pairing</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:8px 0;">
  <div style="font:700 64px/1.0 var(--font-sans); display:flex; gap:18px; flex-wrap:wrap;">
    <span style="color:#109E6E;">DevFest</span>
    <span style="color:#EC6839;">Toulouse</span>
  </div>
  <div style="margin-top:18px; font:var(--type-body); color:var(--gray); max-width:580px;">
    <strong>Strict pairing.</strong> "DevFest" is <em>always</em> Malachite #109E6E. "Toulouse" is <em>always</em> Terracotta #EC6839. Never swap. Never recolor. Blue CTA #507BBD is functional only — never used as identity.
  </div>
</div></body></html>
