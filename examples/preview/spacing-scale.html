<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:8px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:4px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">xs · 4</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:8px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">s · 8</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:12px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">m · 12</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:16px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">l · 16</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:24px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">xl · 24</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:32px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">2xl · 32</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:48px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">3xl · 48</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:64px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">4xl · 64</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><div style="width:80px; height:64px; background:#EC6839; border-radius:4px;"></div><div style="font:var(--type-small);">5xl · 80</div></div>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light); margin-top:12px;">4-px-rooted scale. No magic numbers — compose paddings and gaps from these tokens.</div>
</div></body></html>
