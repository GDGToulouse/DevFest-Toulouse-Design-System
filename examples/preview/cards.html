<!doctype html><html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css"></head>
<body style="background:#FAF7F4;"><div class="card">
  <div style="display:flex; gap:18px; flex-wrap:wrap;">
    <div style="width:240px; background:#fff; border-radius:32px; box-shadow:0 12px 16px 4px rgba(29,29,27,0.14); overflow:hidden;">
      <div style="height:120px; background:linear-gradient(rgba(29,29,27,0.3),rgba(29,29,27,0.3)), #C0E1D7; "></div>
      <div style="padding:16px 18px 20px;">
        <div style="font:var(--type-caption); color:#B94420; letter-spacing:.4px; text-transform:uppercase;">PAR L'ÉQUIPE</div>
        <div style="font:var(--type-card-title-s); margin-top:6px;">DevFest 2025 :<br>le programme</div>
        <div style="font:var(--type-small); color:var(--gray-light); margin-top:8px;">12 nov 2025 · 3 min</div>
      </div>
    </div>
    <div style="width:200px; background:#fff; border-radius:16px; box-shadow:0 4px 64px 4px rgba(29,29,27,0.12); padding:24px; text-align:center;">
      <div style="font:var(--type-stat-value); color:#1D1D1B;">1 200</div>
      <div style="font:var(--type-stat-label); color:#777776;">participants</div>
    </div>
    <div style="width:200px; background:#41B38E; border-radius:16px; padding:18px; color:#fff;">
      <div style="font:var(--type-caption); letter-spacing:.4px; text-transform:uppercase; opacity:.85;">PLATINUM</div>
      <div style="font:var(--type-card-title-s); margin-top:6px;">Sponsor name</div>
      <div style="font:400 italic 14px/1.4 var(--font-sans); margin-top:6px; opacity:.9;">Baseline italic</div>
    </div>
  </div>
</div></body></html>
