<!doctype html><html><head><meta charset="utf-8"><title>Header</title><link rel="stylesheet" href="_card.css"></head>
<body style="background:#FAF7F4;"><div class="card">
  <div style="background:#fff; height:60px; box-shadow:0 4px 12px rgba(29,29,27,0.10); border-radius:8px; padding:0 24px; display:flex; align-items:center; gap:24px;">
    <img src="../assets/logo/Avatar_400x400px.png" style="width:40px; height:40px; border-radius:8px;" alt="">
    <div style="display:flex; gap:18px; font:var(--type-body-bold); color:#777776;">
      <span style="color:#1D1D1B;">Programme</span><span>Speakers</span><span>Partenaires</span><span>Actus</span>
    </div>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center; font:var(--type-body); color:#777776;">
      <i class="fa-brands fa-linkedin-in"></i><i class="fa-brands fa-youtube"></i><i class="fa-brands fa-x-twitter"></i><i class="fa-brands fa-bluesky"></i>
      <button style="background:#fff; color:#507BBD; border:1.5px solid #507BBD; border-radius:12px; padding:8px 14px; font:var(--type-caption); font-size:13px; font-weight:700; white-space:nowrap;">Devenir partenaire</button>
      <button style="background:#507BBD; color:#fff; border:0; border-radius:12px; padding:8px 14px; font:var(--type-caption); font-size:13px; font-weight:700; white-space:nowrap;">Proposer un talk</button>
    </div>
  </div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</div></body></html>
