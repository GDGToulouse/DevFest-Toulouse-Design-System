<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
    <button style="background:#507BBD; color:#fff; font:var(--type-body-bold); border:0; border-radius:12px; padding:12px 18px; cursor:pointer;">Proposer un talk</button>
    <button style="background:#EC6839; color:#fff; font:var(--type-body-bold); border:0; border-radius:12px; padding:12px 18px; cursor:pointer;">Hover state</button>
    <button style="background:#fff; color:#507BBD; font:var(--type-body-bold); border:1.5px solid #507BBD; border-radius:12px; padding:12px 18px; cursor:pointer;">Devenir partenaire</button>
  </div>
  <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin-top:14px;">
    <button style="background:#507BBD; color:#fff; font:var(--type-stat-label); font-weight:700; border:0; border-radius:18px; padding:20px 32px; cursor:pointer;">Proposer un talk</button>
    <button style="background:#fff; color:#507BBD; font:var(--type-stat-label); font-weight:700; border:1.5px solid #507BBD; border-radius:18px; padding:20px 32px; cursor:pointer;">Devenir partenaire</button>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light); margin-top:12px;">Small · radius-s 12, padding 12 18 · Large · radius-l 18, padding 20 32. Hover: bg → Terracotta.</div>
</div></body></html>
