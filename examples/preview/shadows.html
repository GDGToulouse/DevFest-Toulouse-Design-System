<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css"></head>
<body style="background:#FAF7F4;"><div class="card">
  <div style="display:flex; gap:24px; flex-wrap:wrap;">
    <div style="flex:1; min-width:180px;"><div style="height:96px; background:#fff; border-radius:16px; box-shadow:0 4px 12px rgba(29,29,27,0.10);"></div><div style="font:var(--type-body-bold); margin-top:10px; font-size:13px;">shadow-header</div><div style="font:var(--type-small); color:var(--gray-light);">0 4px 12px ink/10 · fixed header</div></div>
    <div style="flex:1; min-width:180px;"><div style="height:96px; background:#fff; border-radius:16px; box-shadow:0 12px 16px 4px rgba(29,29,27,0.14);"></div><div style="font:var(--type-body-bold); margin-top:10px; font-size:13px;">shadow-card</div><div style="font:var(--type-small); color:var(--gray-light);">0 12px 16px 4px ink/14 · article cards</div></div>
    <div style="flex:1; min-width:180px;"><div style="height:96px; background:#fff; border-radius:16px; box-shadow:0 4px 64px 4px rgba(29,29,27,0.12);"></div><div style="font:var(--type-body-bold); margin-top:10px; font-size:13px;">shadow-section</div><div style="font:var(--type-small); color:var(--gray-light);">0 4px 64px 4px ink/12 · floating sections</div></div>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light); margin-top:14px;">Always cast in ink #1D1D1B. Never gray. Never colored.</div>
</div></body></html>
