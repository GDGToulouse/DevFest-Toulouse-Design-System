<!doctype html><html><head><meta charset="utf-8"><title>Icons</title><link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head>
<body><div class="card">
  <div style="font:var(--type-caption); color:var(--gray); letter-spacing:.4px; text-transform:uppercase; margin-bottom:10px;">Functional icons · Font Awesome Free 7</div>
  <div style="display:flex; gap:22px; align-items:center; font-size:24px; color:#1D1D1B; flex-wrap:wrap;">
    <i class="fa-regular fa-calendar"></i><i class="fa-solid fa-microphone"></i><i class="fa-solid fa-handshake"></i><i class="fa-solid fa-users"></i><i class="fa-solid fa-location-dot"></i><i class="fa-regular fa-clock"></i><i class="fa-solid fa-mug-hot"></i>
    <span style="margin-left:14px; display:flex; gap:14px; color:#1D1D1B;">
      <i class="fa-brands fa-linkedin-in"></i><i class="fa-brands fa-youtube"></i><i class="fa-brands fa-x-twitter"></i><i class="fa-brands fa-bluesky"></i>
    </span>
  </div>
  <div style="font:var(--type-small); color:var(--gray-light); margin-top:14px;">Style: regular ou solid selon contraste · 16–24 px · ink ou white · jamais de couleur de marque sur les icônes fonctionnelles.<br>Réseaux sociaux toujours dans cet ordre : LinkedIn → YouTube → X → Bluesky.</div>
</div></body></html>
